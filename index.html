<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIMEDIC | Despacho de Ambulancias</title>
    <style>
        :root {
            --emergency: #d32f2f;
            --accent: #25D366;
            --call: #0288d1;
            --success-gps: #2e7d32;
            --text: #2c3e50;
            --bg-light: #f8f9fa;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #fdf2f2 0%, #ffebee 100%); 
            margin: 0; padding: 15px; min-height: 100vh; color: var(--text);
        }
        
        .container { 
            max-width: 450px; margin: 50px auto 20px auto; background: #ffffff; padding: 25px; 
            border-radius: 35px; box-shadow: 0 20px 40px rgba(211, 47, 47, 0.15); 
            border-top: 10px solid var(--emergency); 
            position: relative;
        }

        .logo-container {
            width: 100px; height: 100px; background: white;
            margin: -80px auto 10px auto; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden; border: 4px solid white;
        }
        .logo-container img { width: 90%; height: 90%; object-fit: contain; }

        .header-box { text-align: center; margin-bottom: 20px; transition: 0.3s; }
        h1 { color: var(--emergency); margin: 0; font-size: 26px; font-weight: 900; letter-spacing: -1px; }
        
        .emergency-badge {
            background: var(--emergency); color: white; padding: 6px 15px;
            border-radius: 50px; font-size: 11px; font-weight: bold; display: inline-block; margin-top: 8px;
        }
        
        .alert-active { animation: alert-flash 1s infinite; }
        @keyframes alert-flash {
            0% { opacity: 1; }
            50% { opacity: 0.7; transform: scale(1.02); }
            100% { opacity: 1; }
        }
        
        label { display: block; margin-top: 18px; font-weight: 700; font-size: 0.72rem; text-transform: uppercase; color: #546e7a; }
        
        input, textarea, select { 
            width: 100%; padding: 12px; margin-top: 6px; border: 2px solid #eef2f6; 
            border-radius: 12px; box-sizing: border-box; font-size: 16px; background: #fdfdfd;
        }

        input:focus, select:focus { border-color: var(--call); outline: none; background: #fff; }
        .p-roja { color: #d32f2f; font-weight: bold; }

        .grid-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }

        .check-box {
            display: flex; align-items: center; background: var(--bg-light); padding: 10px;
            border-radius: 12px; border: 1px solid #eef2f6; cursor: pointer; font-size: 0.82em;
        }
        .check-box input { width: auto; margin-right: 10px; transform: scale(1.2); }

        .btn-location {
            background-color: #fff5f5; color: var(--emergency); border: 2px dashed var(--emergency);
            padding: 14px; margin-top: 15px; border-radius: 15px; cursor: pointer;
            font-size: 14px; width: 100%; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .gps-success { background-color: var(--success-gps) !important; color: white !important; border: 2px solid var(--success-gps) !important; }

        .actions { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }

        .btn-main {
            min-height: 65px; width: 100%; border-radius: 20px; font-size: 16px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-decoration: none; border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-whatsapp { background-color: var(--accent); color: white; box-shadow: 0 6px 15px rgba(37,211,102,0.3); }
        .btn-call { background-color: var(--call); color: white; box-shadow: 0 6px 15px rgba(2, 136, 209, 0.3); }
        .btn-call.urgent { background-color: var(--emergency); animation: alert-flash 1s infinite; }

        .mun-label { font-size: 11px; font-weight: 500; opacity: 0.9; text-transform: uppercase; letter-spacing: 0.5px; }
        #otro_destino_container { display: none; margin-top: 10px; }
        .pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.4); } 70% { box-shadow: 0 0 0 12px rgba(211, 47, 47, 0); } 100% { box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <img src="https://iili.io/qKhggsa.jpg" alt="Logo SERVIMEDIC">
    </div>

    <div class="header-box" id="headerBox">
        <h1>Servimedic / Emisalud</h1>
        <div class="emergency-badge">🚨 SOLICITUD DE AMBULANCIA</div>
    </div>

    <form id="medicForm">
        <label>📍 Municipio del Evento</label>
        <select id="municipio" onchange="actualizarContactos()">
            <option value="Araure">Araure</option>
            <option value="Acarigua">Acarigua</option>
            <option value="Agua Blanca">Agua Blanca</option>
            <option value="San Rafael de Onoto">San Rafael de Onoto</option>
            <option value="Esteller (Píritu)">Esteller (Píritu)</option>
            <option value="Turén">Turén</option>
            <option value="Ospino">Ospino</option>
            <option value="Guanare">Guanare</option>
            <option value="Biscucuy">Biscucuy</option>
            <option value="Chabasquén">Chabasquén</option>
        </select>

        <label>🚦 Prioridad (Triage)</label>
        <select id="prioridad" onchange="actualizarPrioridad()">
            <option value="🟢 PRIORIDAD BAJA (Estable)">🟢 PRIORIDAD BAJA (Estable)</option>
            <option value="🟡 PRIORIDAD MEDIA (Urgencia)">🟡 PRIORIDAD MEDIA (Urgencia)</option>
            <option value="🔴 PRIORIDAD ALTA (Emergencia Vital)" class="p-roja">🔴 PRIORIDAD ALTA (Emergencia Vital)</option>
        </select>

        <label>🚑 Equipo Requerido</label>
        <div class="grid-options">
            <label class="check-box"><input type="checkbox" id="paramedico"> Paramédico</label>
            <label class="check-box"><input type="checkbox" id="medico"> Médico</label>
            <label class="check-box"><input type="checkbox" id="enfermeria"> Enfermería</label>
            <label class="check-box"><input type="checkbox" id="oxigeno"> Oxígeno</label>
        </div>

        <label>Datos del Paciente</label>
        <input type="text" id="nombre" placeholder="Nombre y Apellido" required>
        <input type="tel" id="telefono_paciente" placeholder="Número de teléfono" required>

        <label>Dirección Punto de Partida</label>
        <textarea id="direccion" rows="2" placeholder="Referencia cercana..." required></textarea>
        
        <button type="button" class="btn-location pulse" onclick="obtenerUbicacion()">📍 Vincular GPS (Urgente)</button>
        <input type="hidden" id="link_mapa" value="No compartida">

        <label>Motivo del Traslado</label>
        <input type="text" id="motivo" placeholder="Ej: Accidente, Dolor torácico...">

        <label>🏥 Centro de Salud Destino</label>
        <select id="destino" onchange="verificarOtroDestino()">
            <option value="Hospital Casal Ramos">Hospital Casal Ramos</option>
            <option value="Seguro Social (IVSS)">Seguro Social (IVSS)</option>
            <option value="Hospital Materno Infantil">Hospital Materno Infantil</option>
            <option value="OTRO">-- OTRO (Especificar) --</option>
        </select>
        <div id="otro_destino_container">
            <input type="text" id="otro_destino" placeholder="Especifique centro asistencial...">
        </div>

        <div class="actions">
            <button type="button" class="btn-main btn-whatsapp" onclick="enviarWhatsApp()">
                <span>Solicitar por WhatsApp</span>
                <span id="label_wa" class="mun-label">DESPACHO ARAURE</span>
            </button>
            <a href="tel:+584121187321" id="btn_llamada" class="btn-main btn-call">
                <span>📞 LLAMAR A DESPACHO</span>
                <span id="label_municipio" class="mun-label">ARAURE</span>
            </a>
        </div>
    </form>
</div>

<script>
const contactosMunicipios = {
    "Araure":             { tel: "+584121187321", wa: "584245477702" },
    "Acarigua":           { tel: "+584121187321", wa: "584245477702" },
    "Agua Blanca":        { tel: "+584121187321", wa: "584245477702" },
    "San Rafael de Onoto":{ tel: "+584121187321", wa: "584245477702" },
    "Esteller (Píritu)":  { tel: "+584121187321", wa: "584245477702" },
    "Turén":              { tel: "+584121187321", wa: "584245477702" },
    "Ospino":             { tel: "+584145528788", wa: "584145528788" },
    "Guanare":            { tel: "+584145528788", wa: "584145528788" },
    "Biscucuy":           { tel: "+584145528788", wa: "584145528788" },
    "Chabasquén":         { tel: "+584145528788", wa: "584145528788" }
};

function actualizarContactos() {
    const mun = document.getElementById('municipio').value;
    const config = contactosMunicipios[mun];
    document.getElementById('btn_llamada').href = "tel:" + config.tel;
    document.getElementById('label_municipio').innerText = mun.toUpperCase();
    document.getElementById('label_wa').innerText = "DESPACHO " + mun.toUpperCase();
}

function actualizarPrioridad() {
    const prio = document.getElementById('prioridad').value;
    const header = document.getElementById('headerBox');
    const btnCall = document.getElementById('btn_llamada');
    
    // Resetear checkboxes
    document.getElementById('paramedico').checked = false;
    document.getElementById('medico').checked = false;
    document.getElementById('enfermeria').checked = false;
    document.getElementById('oxigeno').checked = false;

    if (prio.includes("🟡")) {
        header.classList.remove('alert-active');
        btnCall.classList.remove('urgent');
        document.getElementById('paramedico').checked = true;
    } 
    else if (prio.includes("🔴")) {
        header.classList.add('alert-active');
        btnCall.classList.add('urgent');
        document.getElementById('medico').checked = true;
        document.getElementById('enfermeria').checked = true;
        document.getElementById('oxigeno').checked = true;
    } 
    else {
        header.classList.remove('alert-active');
        btnCall.classList.remove('urgent');
    }
}

function verificarOtroDestino() {
    const d = document.getElementById('destino');
    document.getElementById('otro_destino_container').style.display = (d.value === "OTRO") ? "block" : "none";
}

function obtenerUbicacion() {
    const btn = document.querySelector('.btn-location');
    if (!navigator.geolocation) return alert("GPS no compatible.");
    btn.innerText = "⌛ Localizando...";
    navigator.geolocation.getCurrentPosition((pos) => {
        const lat = pos.coords.latitude; 
        const lon = pos.coords.longitude;
        // CORRECCIÓN DEL ENLACE DE GOOGLE MAPS
        document.getElementById('link_mapa').value = `https://www.google.com/maps?q=${lat},${lon}`;
        btn.innerHTML = "✅ UBICACIÓN VINCULADA"; 
        btn.classList.add('gps-success');
        btn.classList.remove('pulse');
    }, () => {
        alert("No se pudo obtener la ubicación. Active su GPS.");
        btn.innerText = "📍 Vincular GPS (Urgente)";
    }, { enableHighAccuracy: true });
}

function enviarWhatsApp() {
    const mun = document.getElementById('municipio').value;
    const config = contactosMunicipios[mun];
    const nom = document.getElementById('nombre').value;
    const tel = document.getElementById('telefono_paciente').value;
    const dir = document.getElementById('direccion').value;
    const map = document.getElementById('link_mapa').value;
    const prio = document.getElementById('prioridad').value;
    const mot = document.getElementById('motivo').value || "No especificado";
    
    let des = document.getElementById('destino').value;
    if (des === "OTRO") des = document.getElementById('otro_destino').value || "No especificado";

    if(!nom || !tel || !dir) return alert("Complete Nombre, Teléfono y Dirección.");

    // Construcción dinámica de equipo solicitado
    let equipo = [];
    if(document.getElementById('paramedico').checked) equipo.push("Paramédico");
    if(document.getElementById('medico').checked) equipo.push("Médico");
    if(document.getElementById('enfermeria').checked) equipo.push("Enfermería");
    if(document.getElementById('oxigeno').checked) equipo.push("Oxígeno");
    const equipoTxt = equipo.length > 0 ? equipo.join(", ") : "Básico";

    const msj = `*🚨 SOLICITUD DE AMBULANCIA 🚨*%0A` +
                `*MUNICIPIO:* ${mun.toUpperCase()}%0A` +
                `*PRIORIDAD:* ${prio}%0A` +
                `--------------------------------%0A` +
                `*PACIENTE:* ${nom}%0A` +
                `*TELÉFONO:* ${tel}%0A` +
                `*DIRECCIÓN:* ${dir}%0A` +
                `*MOTIVO:* ${mot}%0A` +
                `*DESTINO:* ${des}%0A%0A` +
                `*EQUIPO:* ${equipoTxt}%0A%0A` +
                `*UBICACIÓN GPS:* ${map}%0A%0A` +
                `_Enviado desde el Despacho SERVIMEDIC_`;

    window.open(`https://api.whatsapp.com/send?phone=${config.wa}&text=${msj}`, '_blank');
}
</script>
</body>
</html>
