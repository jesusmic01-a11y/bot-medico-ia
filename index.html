<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SERVIMEDIC | Real-Time Tracker</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAURLGctd8vAZ1rCuXZOw1EtRjw-5Swm1I&libraries=places"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; font-family: sans-serif; margin: 0; overflow: hidden; }
        #map { height: 45vh; width: 100%; }
        .bottom-sheet { background: #0f172a; border-radius: 30px 30px 0 0; padding: 20px; height: 55vh; overflow-y: auto; }
        .input-route { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; width: 100%; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="bottom-sheet">
        <div class="flex justify-between mb-4">
            <div class="bg-blue-600 px-4 py-2 rounded-xl text-center"><span id="dist-txt" class="block font-black text-sm">0.0 km</span><span class="text-[8px] uppercase font-bold opacity-70">Distancia</span></div>
            <div class="bg-slate-800 px-4 py-2 rounded-xl text-center"><span id="price-txt" class="block font-black text-sm">$0.00</span><span class="text-[8px] uppercase font-bold opacity-70">Tarifa</span></div>
        </div>

        <input type="text" id="origen-input" class="input-route" readonly placeholder="Detectando tu ubicación en tiempo real...">
        <input type="text" id="destino-input" class="input-route" placeholder="¿A dónde vas? (Escribe y selecciona)">
        
        <button onclick="calcularRuta()" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase mb-3">Calcular Ruta</button>
        <button onclick="enviarWhatsApp()" class="w-full bg-green-600 py-4 rounded-2xl font-black text-xs uppercase">Pedir por WhatsApp</button>
    </div>

    <script>
        let map, userPos, dirService, dirRenderer, marker, geocoder, autocomplete;

        function initMap() {
            geocoder = new google.maps.Geocoder();
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 17,
                center: { lat: 9.558, lng: -69.201 },
                styles: [{"elementType":"geometry","stylers":[{"color":"#242f3e"}]}],
                disableDefaultUI: true
            });

            dirService = new google.maps.DirectionsService();
            dirRenderer = new google.maps.DirectionsRenderer({ map: map, suppressMarkers: true, polylineOptions: { strokeColor: "#3b82f6", strokeWeight: 6 } });

            // Autocomplete para el destino
            autocomplete = new google.maps.places.Autocomplete(document.getElementById('destino-input'));

            // RASTREO EN TIEMPO REAL
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition((pos) => {
                    userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    
                    if (!marker) {
                        marker = new google.maps.Marker({ position: userPos, map: map, icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: "#3b82f6", fillOpacity: 1, strokeColor: "white", strokeWeight: 2 } });
                    }
                    marker.setPosition(userPos);
                    map.setCenter(userPos);

                    // Actualizar dirección del origen
                    geocoder.geocode({ location: userPos }, (res) => {
                        if(res[0]) document.getElementById('origen-input').value = res[0].formatted_address;
                    });
                }, null, { enableHighAccuracy: true });
            }
        }

        function calcularRuta() {
            const dest = document.getElementById('destino-input').value;
            if(!dest || !userPos) return alert("Espera a que el GPS cargue o escribe un destino.");

            dirService.route({ origin: userPos, destination: dest, travelMode: 'DRIVING' }, (res, status) => {
                if (status === 'OK') {
                    dirRenderer.setDirections(res);
                    const km = res.routes[0].legs[0].distance.value / 1000;
                    document.getElementById('dist-txt').innerText = km.toFixed(1) + " km";
                    document.getElementById('price-txt').innerText = "$" + (km * 0.8 + 2.0).toFixed(2);
                } else {
                    alert("No se pudo trazar la ruta: " + status);
                }
            });
        }

        function enviarWhatsApp() {
            const dest = document.getElementById('destino-input').value;
            const dist = document.getElementById('dist-txt').innerText;
            const link = `https://www.google.com/maps/search/?api=1&query=${userPos.lat},${userPos.lng}`;
            const msg = `🚕 *SOLICITUD SERVIMEDIC*\n🏁 Destino: ${dest}\n📏 Distancia: ${dist}\n📍 Mi Ubicación: ${link}`;
            window.open(`https://wa.me/584145528788?text=${encodeURIComponent(msg)}`);
        }

        window.onload = initMap;
    </script>
</body>
</html>
