<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chat Médico</title>
    <style>
        body { font-family: sans-serif; background: #e5ddd5; display: flex; justify-content: center; padding: 20px; }
        #chat { width: 100%; max-width: 400px; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #header { background: #075e54; color: white; padding: 15px; text-align: center; }
        #box { height: 400px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 8px 12px; border-radius: 8px; font-size: 14px; max-width: 80%; }
        .user { background: #dcf8c6; align-self: flex-end; }
        .bot { background: #f0f0f0; align-self: flex-start; }
        #input-area { display: flex; padding: 10px; border-top: 1px solid #ddd; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 5px; padding: 8px; }
        button { margin-left: 5px; background: #075e54; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat">
        <div id="header">Asistente Médico IA</div>
        <div id="box"></div>
        <div id="input-area">
            <input type="text" id="text" placeholder="Escribe aquí...">
            <button onclick="send()">Enviar</button>
        </div>
    </div>
    <script>
        async function send() {
            const i = document.getElementById('text');
            const b = document.getElementById('box');
            if(!i.value) return;

            b.innerHTML += `<div class="msg user">${i.value}</div>`;
            const prompt = i.value;
            i.value = "";

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({mensaje: prompt})
                });
                const data = await res.json();
                b.innerHTML += `<div class="msg bot">${data.respuesta}</div>`;
            } catch {
                b.innerHTML += `<div class="msg bot">Error de conexión.</div>`;
            }
            b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>
