<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Médico</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-window { width: 100%; max-width: 450px; height: 80vh; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #top { background: #2c3e50; color: white; padding: 20px; border-radius: 20px 20px 0 0; text-align: center; }
        #history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 15px; max-width: 85%; }
        .u { background: #3498db; color: white; align-self: flex-end; }
        .b { background: #ecf0f1; color: #2c3e50; align-self: flex-start; }
        #input-box { display: flex; padding: 15px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 25px; padding: 12px 20px; outline: none; }
        button { background: #27ae60; color: white; border: none; border-radius: 50%; width: 45px; height: 45px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-window">
    <div id="top">🩺 Orientación Médica</div>
    <div id="history"><div class="bubble b">Hola. ¿En qué puedo orientarte hoy?</div></div>
    <div id="input-box">
        <input type="text" id="msg" placeholder="Escribe tus síntomas...">
        <button onclick="talk()">➔</button>
    </div>
</div>
<script>
    async function talk() {
        const i = document.getElementById('msg');
        const h = document.getElementById('history');
        if(!i.value) return;
        
        const userText = i.value;
        h.innerHTML += `<div class="bubble u">${userText}</div>`;
        i.value = "";
        h.scrollTop = h.scrollHeight;

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({mensaje: userText})
            });
            const data = await res.json();
            h.innerHTML += `<div class="bubble b">${data.respuesta}</div>`;
        } catch {
            h.innerHTML += `<div class="bubble b">Lo siento, intenta de nuevo en un momento.</div>`;
        }
        h.scrollTop = h.scrollHeight;
    }
</script>
</body>
</html>
