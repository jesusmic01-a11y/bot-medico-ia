<!DOCTYPE html>
<html>
  <head>
    <title>Sistema de Ruta de Ambulancia</title>
    <meta name="viewport" content="initial-scale=1.0, user-scalable=no">
    <meta charset="utf-8">
    <style>
      #map { height: 100%; }
      html, body { height: 100%; margin: 0; padding: 0; font-family: sans-serif; }
      #floating-panel {
        position: absolute; top: 10px; left: 5%; z-index: 5;
        background-color: #fff; padding: 10px; border: 1px solid #999;
        text-align: center; border-radius: 8px; width: 80%;
      }
      input { width: 70%; padding: 8px; margin-bottom: 5px; }
      button { padding: 8px 15px; background: #d32f2f; color: white; border: none; cursor: pointer; }
    </style>
  </head>
  <body>
    <div id="floating-panel">
      <b>Ruta de Emergencia</b><br>
      <input id="destination" type="text" placeholder="¿A dónde va la ambulancia? (Ej: Hospital Central)">
      <button id="submit">Trazar Ruta</button>
      <div id="info"></div>
    </div>
    <div id="map"></div>

    <script>
      function initMap() {
        const directionsService = new google.maps.DirectionsService();
        const directionsRenderer = new google.maps.DirectionsRenderer();
        const map = new google.maps.Map(document.getElementById("map"), {
          zoom: 14,
          center: { lat: 10.4806, lng: -66.9036 }, // Caracas por defecto
        });
        directionsRenderer.setMap(map);

        // Intentar obtener ubicación real (GPS)
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((position) => {
            const pos = { lat: position.coords.latitude, lng: position.coords.longitude };
            map.setCenter(pos);
            new google.maps.Marker({ position: pos, map: map, title: "Ambulancia" });
          });
        }

        document.getElementById("submit").addEventListener("click", () => {
          calculateAndDisplayRoute(directionsService, directionsRenderer);
        });
      }

      function calculateAndDisplayRoute(directionsService, directionsRenderer) {
        const dest = document.getElementById("destination").value;
        if (!dest) return;

        // Pedimos la ruta desde donde estamos (o una ubicación fija)
        navigator.geolocation.getCurrentPosition((position) => {
          directionsService.route(
            {
              origin: { lat: position.coords.latitude, lng: position.coords.longitude },
              destination: dest,
              travelMode: google.maps.TravelMode.DRIVING,
            },
            (response, status) => {
              if (status === "OK") {
                directionsRenderer.setDirections(response);
                const route = response.routes[0].legs[0];
                document.getElementById("info").innerHTML = 
                  `Distancia: ${route.distance.text} | Tiempo: ${route.duration.text}`;
              } else {
                alert("No se pudo trazar la ruta: " + status);
              }
            }
          );
        });
      }
    </script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=TU_LLAVE_AQUI&callback=initMap"></script>
  </body>
</html>
