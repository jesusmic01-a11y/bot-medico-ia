<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Médico IA</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #chat-container { width: 100%; max-width: 400px; height: 85vh; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        #header { background: #007bff; color: white; padding: 15px; text-align: center; font-weight: bold; border-radius: 15px 15px 0 0; }
        #messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 14px; line-height: 1.4; }
        .bot { background: #e9ecef; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: #007bff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        #input-area { display: flex; padding: 15px; border-top: 1px solid #eee; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 15px; outline: none; }
        button { background: #007bff; color: white; border: none; border-radius: 50%; width: 40px; height: 40px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
<div id="chat-container">
    <div id="header">🩺 Asistente Médico Virtual</div>
    <div id="messages">
        <div class="msg bot">Hola, soy tu asistente de triaje. ¿En qué puedo ayudarte hoy?</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Describe tus síntomas...">
        <button onclick="enviar()">➔</button>
    </div>
</div>
<script>
    const messages = document.getElementById('messages');
    const input = document.getElementById('user-input');

    async function enviar() {
        const texto = input.value.trim();
        if(!texto) return;

        appendMsg(texto, 'user');
        input.value = "";
        const loading = appendMsg("Pensando...", 'bot');

        try {
            const res = await fetch('/chat', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ mensaje: texto })
            });
            const data = await res.json();
            loading.innerText = data.respuesta;
        } catch (e) {
            loading.innerText = "Error al conectar con el servidor.";
        }
    }

    function appendMsg(txt, side) {
        const div = document.createElement('div');
        div.className = `msg ${side}`;
        div.innerText = txt;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
    }

    input.addEventListener("keypress", (e) => { if(e.key === "Enter") enviar(); });
</script>
</body>
</html>
