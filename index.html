<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AmbuRoute - Sistema de Emergencias</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        .panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: white; padding: 20px; border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2); width: 90%; max-width: 400px;
        }

        h2 { margin: 0 0 15px 0; color: #d32f2f; font-size: 1.2rem; display: flex; align-items: center; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        
        button {
            width: 100%; padding: 12px; background: #d32f2f; color: white;
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #b71c1c; }

        #status { margin-top: 15px; font-size: 0.9rem; color: #555; border-top: 1px solid #eee; padding-top: 10px; display: none; }
        .data { font-weight: bold; color: #2c3e50; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>🚑 RUTA DE AMBULANCIA</h2>
        <input id="origin" type="text" placeholder="Punto de recogida (o GPS actual)">
        <input id="dest" type="text" placeholder="Hospital de destino">
        <button onclick="trazarRuta()">CALCULAR TIEMPO DE RESPUESTA</button>
        
        <div id="status">
            Distancia: <span id="dist" class="data">--</span><br>
            Tiempo estimado: <span id="time" class="data">--</span>
        </div>
    </div>

    <div id="map"></div>

    <script>
        let map, directionsService, directionsRenderer;

        function initMap() {
            directionsService = new google.maps.DirectionsService();
            directionsRenderer = new google.maps.DirectionsRenderer();
            
            // Coordenadas iniciales (Venezuela - Caracas)
            const venz = { lat: 10.4806, lng: -66.9036 };
            
            map = new google.maps.Map(document.getElementById("map"), {
                zoom: 12,
                center: venz,
                disableDefaultUI: true
            });
            
            directionsRenderer.setMap(map);
        }

        async function trazarRuta() {
            const origin = document.getElementById("origin").value;
            const dest = document.getElementById("dest").value;

            if (!dest) {
                alert("Por favor ingresa un destino");
                return;
            }

            const request = {
                origin: origin || { lat: 10.4806, lng: -66.9036 }, // Usa Caracas si el origen está vacío
                destination: dest,
                travelMode: 'DRIVING'
            };

            directionsService.route(request, (result, status) => {
                if (status == 'OK') {
                    directionsRenderer.setDirections(result);
                    document.getElementById("status").style.display = "block";
                    document.getElementById("dist").innerText = result.routes[0].legs[0].distance.text;
                    document.getElementById("time").innerText = result.routes[0].legs[0].duration.text;
                } else {
                    alert("No pudimos encontrar la ruta. Intenta con nombres más específicos.");
                }
            });
        }
    </script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=TU_API_KEY&callback=initMap"></script>
</body>
</html>
